name: 产品简报
description: 定义产品问题、范围与验收标准。
title: "[Product] "
labels: ["area:product", "type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题
      description: 我们要解决什么用户或业务问题？
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: 用户
      description: 哪些人会受到影响？他们要完成什么任务？
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 哪些内容在范围内，哪些不在范围内？
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 上线前必须满足哪些条件？
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: 风险
      description: 产品、UX、安全、数据、AI 或运行风险。
