name: Product Brief
description: Define a product problem, scope, and acceptance criteria.
title: "[Product] "
labels: ["area:product", "type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or business problem are we solving?
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Users
      description: Who is affected and what job are they trying to complete?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true before this ships?
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: Product, UX, security, data, AI, or operational risks.
