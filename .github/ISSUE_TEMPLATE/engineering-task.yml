name: Engineering Task
description: Track an implementation, infrastructure, or technical design task.
title: "[Engineering] "
labels: ["type:feature"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Proposed Approach
      description: Include APIs, data, UI, AI workflow, or infrastructure notes.
  - type: textarea
    id: tests
    attributes:
      label: Verification
      description: Tests, evals, or manual checks needed.
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: Rollout And Rollback
      description: Feature flags, migrations, monitoring, rollback plan.
  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: Security, privacy, reliability, cost, or compatibility risks.
