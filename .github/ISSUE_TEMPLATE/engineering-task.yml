name: 工程任务
description: 跟踪实现、基础设施或技术设计相关任务。
title: "[Engineering] "
labels: ["type:feature"]
body:
  - type: textarea
    id: objective
    attributes:
      label: 目标
      description: 需要发生什么变化？
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: 方案
      description: 请包含 API、数据、UI、AI 工作流或基础设施说明。
  - type: textarea
    id: tests
    attributes:
      label: 验证
      description: 需要哪些测试、评测或人工检查？
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: 发布与回滚
      description: 功能开关、迁移、监控与回滚方案。
  - type: textarea
    id: risks
    attributes:
      label: 风险
      description: 安全、隐私、可靠性、成本或兼容性风险。
