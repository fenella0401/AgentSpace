name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: Release name or milestone
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  release_readiness:
    name: Release Readiness Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Codex release readiness
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/release-readiness.md
          output-file: codex-release-readiness.md

      - name: Upload readiness report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release_name }}-readiness
          path: codex-release-readiness.md
