name: Agent-Orchestration CI

on:
  push:
    branches: [main, twp_dev]
    paths:
      - 'Code/agent-orchestration/**'
      - '.github/workflows/agent-orchestration-ci.yml'
  pull_request:
    paths:
      - 'Code/agent-orchestration/**'
      - '.github/workflows/agent-orchestration-ci.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Code/agent-orchestration

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile
        run: mvn -B -ntp compile

      - name: Test
        run: mvn -B -ntp test

      - name: Package
        run: mvn -B -ntp package -DskipTests
