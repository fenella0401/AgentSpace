# 测试 profile：H2 PostgreSQL 兼容模式，跑 Flyway 迁移验证 DDL 可执行 + Repository 测试。
spring:
  datasource:
    url: jdbc:h2:mem:agent_orch;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
