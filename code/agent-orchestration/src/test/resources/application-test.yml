# 测试 profile：H2 PostgreSQL 兼容模式。用 Spring SQL init 跑 db/schema.sql 建表，
# 顺带验证这份手动初始化 SQL 在 PG 兼容语义下可执行、且与 JPA 实体对齐。
spring:
  datasource:
    url: jdbc:h2:mem:agent_orch;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

# 测试中关闭后台自动调度/投递的干扰：轮询间隔设极大，由测试显式驱动。
orchestration:
  max-retries: 2
  scheduler-poll-interval-ms: 3600000
  outbox:
    max-retries: 3
    backoff-base-seconds: 1
    max-pending: 5
    poll-interval-ms: 3600000
  watchdog:
    poll-interval-ms: 3600000
