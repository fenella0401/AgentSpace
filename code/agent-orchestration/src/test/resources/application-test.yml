# 测试 profile：H2 PostgreSQL 兼容模式，跑 Flyway 迁移验证 DDL 可执行 + Repository 测试。
spring:
  datasource:
    url: jdbc:h2:mem:agent_orch;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

# 测试中关闭后台自动调度/投递的干扰：轮询间隔设极大，由测试显式驱动。
orchestration:
  max-retries: 2
  scheduler-poll-interval-ms: 3600000
  outbox:
    max-retries: 3
    backoff-base-seconds: 1
    max-pending: 5
    poll-interval-ms: 3600000
  watchdog:
    poll-interval-ms: 3600000
