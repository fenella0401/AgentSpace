server:
  port: 8080

spring:
  application:
    name: agent-orchestration

  # 默认连接 openGauss（PostgreSQL 兼容）。本地可用环境变量覆盖。
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agent_orchestration}
    username: ${DB_USER:agent_orchestration}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # 结构由 Flyway 管理，JPA 仅校验
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

# 仅暴露健康检查。
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
