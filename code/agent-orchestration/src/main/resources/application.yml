server:
  port: 8080

spring:
  application:
    name: agent-orchestration

  # 应用运行时数据源：openGauss 官方 JDBC 驱动。本地可用环境变量覆盖。
  datasource:
    url: ${DB_URL:jdbc:opengauss://localhost:5432/agent_orchestration}
    username: ${DB_USER:agent_orchestration}
    password: ${DB_PASSWORD:}
    driver-class-name: org.opengauss.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # 表结构由 db/schema.sql 手动初始化，JPA 仅校验对齐
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect   # openGauss 兼容 PG 方言
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

# 编排运行时参数：超时与重试（全局默认 + per-executorType 覆盖）。
orchestration:
  max-retries: 2
  step-timeout: 30m
  heartbeat-timeout: 5m
  start-timeout: 2m
  # 调度轮询已降级为「兜底 sweeper」：正常推进由 RunScheduleKicker 直驱（事件即时启动），
  # 轮询只兜底崩溃/丢事件/多副本 failover 下滞留的 READY step，故间隔放宽到 15s。见 README §2.5。
  scheduler-poll-interval: 15s
  scheduler-poll-interval-ms: 15000
  watchdog:
    poll-interval-ms: 5000
  # 示例：per-executorType 覆盖
  # overrides:
  #   CODEX:
  #     max-retries: 1
  #     step-timeout: 20m

# Claude Code SDK stream-json 消息适配：脱敏/限长与 runtime 终态合成。见概要设计 §8.4。
claude-code:
  adapter:
    thinking-summary-max-chars: 2000      # agent.thinking 只传摘要，超长截断
    tool-output-max-chars: 8000           # tool_result 单条上限，超大改写 artifact
    synthesize-runtime-terminal: true     # 由 result 行合成 runtime.completed/failed（直连作执行器+运行时）

# 暴露健康检查与 Prometheus 指标。
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
