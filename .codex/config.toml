model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
model_verbosity = "medium"
review_model = "gpt-5.3-codex"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
sandbox_mode = "workspace-write"
project_doc_max_bytes = 65536

[analytics]
enabled = false

[features]
child_agents_md = true
shell_snapshot = true

[agents]
max_threads = 10
max_depth = 1
job_max_runtime_seconds = 3600

[auto_review]
policy = """
AgentSpace 是企业内部 AI SaaS 产品。对涉及凭证、生产数据、部署、计费、IAM
或破坏性文件系统操作的命令，默认倾向要求审批。拒绝任何会暴露密钥或将内部
数据复制到工作区外部的行为。
"""

[shell_environment_policy]
inherit = "core"
exclude = [
  "*TOKEN*",
  "*SECRET*",
  "*PASSWORD*",
  "*PRIVATE_KEY*",
  "OPENAI_API_KEY",
  "GITHUB_TOKEN",
]
