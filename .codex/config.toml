model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
model_verbosity = "medium"
review_model = "gpt-5.3-codex"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
sandbox_mode = "workspace-write"
project_doc_max_bytes = 65536

[analytics]
enabled = false

[features]
child_agents_md = true
shell_snapshot = true

[agents]
max_threads = 10
max_depth = 1
job_max_runtime_seconds = 3600

[auto_review]
policy = """
AgentSpace is an internal AI SaaS product. Prefer approval for commands that
touch credentials, production data, deployments, billing, IAM, or destructive
filesystem operations. Reject actions that expose secrets or copy internal data
outside the workspace.
"""

[shell_environment_policy]
inherit = "core"
exclude = [
  "*TOKEN*",
  "*SECRET*",
  "*PASSWORD*",
  "*PRIVATE_KEY*",
  "OPENAI_API_KEY",
  "GITHUB_TOKEN",
]
